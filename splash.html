<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Cœur de Ville</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000;
}

.splash{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#000;
}

.logo-wrap{
  display:flex;flex-direction:column;
  align-items:center;
  gap:20px;
  animation:fade-up 0.7s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fade-up{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

.logo-img{
  width:200px;
  filter:invert(1);
  opacity:0;
  animation:logo-in 0.6s ease 0.15s forwards;
}

@keyframes logo-in{
  from{opacity:0;transform:scale(0.92);}
  to{opacity:1;transform:scale(1);}
}

.tagline{
  font-size:11px;
  color:rgba(255,255,255,0.35);
  letter-spacing:0.22em;
  text-transform:uppercase;
  font-weight:500;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  opacity:0;
  animation:fade-in 0.5s ease 0.5s forwards;
}

@keyframes fade-in{
  from{opacity:0;}
  to{opacity:1;}
}

.loader-bar{
  position:absolute;
  bottom:56px;
  left:50%;transform:translateX(-50%);
  width:36px;height:2px;
  background:rgba(255,255,255,0.08);
  border-radius:2px;
  overflow:hidden;
}
.loader-fill{
  height:100%;
  background:rgba(255,255,255,0.6);
  border-radius:2px;
  width:0%;
  animation:load 1.3s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
}

@keyframes load{
  0%{width:0%;}
  60%{width:65%;}
  100%{width:100%;}
}

.splash.exit{
  animation:splash-exit 0.4s ease-in forwards;
}
@keyframes splash-exit{
  from{opacity:1;}
  to{opacity:0;}
}
</style>
</head>
