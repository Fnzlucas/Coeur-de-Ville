<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

:root {
  --primary: #0066ff;
  --primary-2: #00a3ff;
  --pink: #ff3b8a;
  --orange: #ff7a00;
  --gold: #ffb800;
  --green: #00d68f;
  --red: #ff4757;
  --purple: #8b5cf6;
  --bg: #f5f7fb;
  --surface: #ffffff;
  --text: #0a0e1a;
  --text-2: #5a6478;
  --text-3: #8a93a6;
  --outline: rgba(10,14,26,.08);
  --outline-2: rgba(10,14,26,.14);
}

html, body {
  height: 100dvh;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Manrope', system-ui, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

.app {
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
  background: var(--bg);
  overflow: hidden;
}
@media (min-width: 500px) {
  .app {
    width: 414px;
    height: 100dvh;
    margin: 0 auto;
    box-shadow: 0 0 60px rgba(0,0,0,.12);
  }
}

.app::before {
  content: '';
  position: absolute;
  inset: -10%;
  background:
    radial-gradient(circle at 20% 10%, rgba(102,126,234,.18), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,59,138,.15), transparent 45%),
    radial-gradient(circle at 50% 90%, rgba(0,211,143,.12), transparent 40%);
  pointer-events: none;
  z-index: 0;
}

/* ════ HEADER ════ */
.header {
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--outline);
  padding: max(14px, env(safe-area-inset-top, 0px) + 14px) 16px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header-back {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  background: rgba(10,14,26,.04);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
  transition: background .15s, transform .1s;
}
.header-back:hover { background: rgba(10,14,26,.08); }
.header-back:active { transform: scale(.92); }
.header-back .material-symbols-outlined { font-size: 20px; color: var(--text); }
.header-title { flex: 1; display: flex; flex-direction: column; }
.header-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-3);
}
.header-name {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  margin-top: 1px;
  letter-spacing: -.015em;
}
.header-points {
  display: flex;
  align-items: center;
  gap: 5px;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  color: #fff;
  padding: 7px 12px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 800;
  box-shadow: 0 4px 14px rgba(255,184,0,.35);
}
.header-points .material-symbols-outlined { font-size: 15px; font-variation-settings: 'FILL' 1; }

/* ════ SCREEN ════ */
.screen {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  position: relative;
  z-index: 1;
}
.screen.active { display: flex; animation: screenIn .4s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes screenIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ════ ÉCRAN 1 — NIVEAUX ════ */
.intro-hero {
  position: relative;
  margin: 16px 16px 22px;

<script>
const Q = window.QUIZ_VILLENEUVE;

const LEVEL_STYLES = {
  apprenti:    { grad: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)', shadow: 'rgba(79,172,254,.45)' },
  connaisseur: { grad: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)', shadow: 'rgba(250,112,154,.4)' },
  maitre:      { grad: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', shadow: 'rgba(118,75,162,.45)' }
};

const BADGE_COLORS = {
  medieval: '#8b5cf6',
  religieux: '#0066ff',
  royal: '#ffb800',
  artistique: '#ff3b8a',
  architectural: '#00d68f'
};

function getStoredPoints() { try { return parseInt(localStorage.getItem('cdv_loyalty_points') || '0'); } catch { return 0; } }
function addStoredPoints(n) { try { localStorage.setItem('cdv_loyalty_points', String(getStoredPoints() + n)); } catch {} }

let state = { levelKey: null, questions: [], current: 0, correct: 0, earnedBadges: new Set(), startTime: 0 };

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderLevels() {
  const container = document.getElementById('levels-container');
  container.innerHTML = '';
  Object.entries(Q.levels).forEach(([key, level]) => {
    const style = LEVEL_STYLES[key];
    const card = document.createElement('div');
    card.className = 'level-card';
    card.style.setProperty('--level-grad', style.grad);
    card.style.setProperty('--level-shadow', style.shadow);
    card.innerHTML = `
      <div class="level-icon-wrap">
        <span class="material-symbols-outlined">${level.icon}</span>
      </div>
      <div class="level-content">
        <div class="level-name">${level.name}</div>
        <div class="level-label">${level.label}</div>
        <div class="level-meta">
          <div class="level-meta-item"><span class="material-symbols-outlined">help</span>${level.questions.length} questions</div>
          <div class="level-meta-item"><span class="material-symbols-outlined">stars</span>+${level.reward_points} pts</div>
        </div>
      </div>
      <div class="level-arrow"><span class="material-symbols-outlined">chevron_right</span></div>
    `;
    card.onclick = () => startLevel(key);
    container.appendChild(card);
  });
}

function startLevel(levelKey) {
  const level = Q.levels[levelKey];
  state = { levelKey, questions: [...level.questions], current: 0, correct: 0, earnedBadges: new Set(), startTime: Date.now() };
  document.getElementById('game-level-label').textContent = level.name;
  document.getElementById('header-points').style.display = 'flex';
  document.getElementById('points-value').textContent = '0';
  showScreen('screen-game');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.current];
  const total = state.questions.length;
  document.getElementById('game-count').textContent = `${state.current + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(state.current / total) * 100}%`;

  const badge = Q.badges[q.badge];
  const badgeColor = BADGE_COLORS[q.badge] || badge.color;
  const wrap = document.getElementById('question-wrap');
  wrap.innerHTML = `
    <div class="question-badge" style="--badge-bg:${hexToRgba(badgeColor,.1)};--badge-color:${badgeColor};--badge-border:${hexToRgba(badgeColor,.25)}">
      <span class="material-symbols-outlined">${badge.icon}</span>
      ${badge.name}
    </div>
    <div class="question-text">${q.question}</div>
    <div id="answers-zone"></div>
  `;
  const zone = document.getElementById('answers-zone');
  if (q.type === 'qcm') renderQCM(zone, q);
  else if (q.type === 'vrai_faux') renderVraiFaux(zone, q);
  hideExplanation();
}

function renderQCM(zone, q) {
  const list = document.createElement('div');
  list.className = 'options-list';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
      <span class="material-symbols-outlined option-icon">check_circle</span>
    `;
    btn.onclick = () => answerQCM(i, q, list);
    list.appendChild(btn);
  });
  zone.appendChild(list);
}

function answerQCM(choice, q, list) {
  const buttons = list.querySelectorAll('.option');
  const isCorrect = choice === q.answer;
  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) { b.classList.add('correct'); b.querySelector('.option-icon').textContent = 'check_circle'; }
    else if (i === choice) { b.classList.add('wrong'); b.querySelector('.option-icon').textContent = 'cancel'; }
    else b.classList.add('dimmed');
  });
  finalizeAnswer(q, isCorrect);
}

function renderVraiFaux(zone, q) {
  const wrap = document.createElement('div');
  wrap.className = 'tf-wrap';
  ['true', 'false'].forEach((val) => {
    const btn = document.createElement('button');
    btn.className = 'tf-btn';
    btn.innerHTML = `<span class="material-symbols-outlined">${val === 'true' ? 'check_circle' : 'cancel'}</span>${val === 'true' ? 'Vrai' : 'Faux'}`;
    btn.onclick = () => answerTF(val === 'true', q, wrap);
    wrap.appendChild(btn);
  });
  zone.appendChild(wrap);
}

function answerTF(choice, q, wrap) {
  const buttons = wrap.querySelectorAll('.tf-btn');
  const isCorrect = choice === q.answer;
  buttons.forEach((b, i) => {
    b.disabled = true;
    const isThisTrue = i === 0;
    if (isThisTrue === q.answer) b.classList.add('correct');
    else if (isThisTrue === choice) b.classList.add('wrong');
    else b.classList.add('dimmed');
  });
  finalizeAnswer(q, isCorrect);
}

function finalizeAnswer(q, isCorrect) {
  if (isCorrect) {
    state.correct++;
    state.earnedBadges.add(q.badge);
    document.getElementById('points-value').textContent = state.correct;
  }
  showExplanation(q, isCorrect);
}

function showExplanation(q, isCorrect) {
  const exp = document.getElementById('explanation');
  const backdrop = document.getElementById('exp-backdrop');
  const icon = document.getElementById('exp-icon');
  const sym = document.getElementById('exp-icon-sym');
  const title = document.getElementById('exp-title');
  const text = document.getElementById('exp-text');
  const nextLabel = document.getElementById('exp-next-label');
  icon.classList.remove('correct', 'wrong');
  icon.classList.add(isCorrect ? 'correct' : 'wrong');
  sym.textContent = isCorrect ? 'check' : 'close';
  title.textContent = isCorrect ? 'Bonne réponse !' : 'Pas tout à fait...';
  text.textContent = q.explanation;
  nextLabel.textContent = state.current + 1 === state.questions.length ? 'Voir mon score' : 'Question suivante';
  setTimeout(() => {
    backdrop.classList.add('show');
    exp.classList.add('show');
  }, 200);
}

function hideExplanation() {
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('exp-backdrop').classList.remove('show');
}

function nextQuestion() {
  hideExplanation();
  setTimeout(() => {
    state.current++;
    if (state.current >= state.questions.length) showResults();
    else renderQuestion();
  }, 350);
}

function showResults() {
  document.getElementById('progress-fill').style.width = '100%';
  const level = Q.levels[state.levelKey];
  const total = state.questions.length;
  const correct = state.correct;
  const percent = Math.round((correct / total) * 100);
  const elapsed = Math.round((Date.now() - state.startTime) / 1000);
  const minutes = Math.floor(elapsed / 60);
  const seconds = elapsed % 60;

  let pointsGained = 0;
  if (percent >= 80) pointsGained = level.reward_points;
  else if (percent >= 50) pointsGained = Math.round(level.reward_points / 2);
  else pointsGained = 1;
  addStoredPoints(pointsGained);

  let rank, message, medalIcon, medalGrad, medalShadow;
  if (percent === 100) {
    rank = "Score parfait !"; message = "Vous connaissez Villeneuve mieux que personne.";
    medalIcon = "workspace_premium"; medalGrad = "linear-gradient(135deg, #ffb800, #ff7a00)"; medalShadow = "rgba(255,184,0,.5)";
  } else if (percent >= 80) {
    rank = "Excellent !"; message = "Votre culture du patrimoine villeneuvois est remarquable.";
    medalIcon = "military_tech"; medalGrad = "linear-gradient(135deg, #fa709a, #fee140)"; medalShadow = "rgba(250,112,154,.4)";
  } else if (percent >= 50) {
    rank = "Bon niveau"; message = "Beau parcours ! Continuez à explorer.";
    medalIcon = "emoji_events"; medalGrad = "linear-gradient(135deg, #4facfe, #00f2fe)"; medalShadow = "rgba(79,172,254,.4)";
  } else {
    rank = "À améliorer"; message = "C'est un début ! Visitez la ville et retentez votre chance.";
    medalIcon = "school"; medalGrad = "linear-gradient(135deg, #a18cd1, #fbc2eb)"; medalShadow = "rgba(161,140,209,.4)";
  }

  document.getElementById('screen-results').innerHTML = `<div class="results-inner">
    <div class="result-medal" style="--medal-grad:${medalGrad};--medal-shadow:${medalShadow}">
      <span class="material-symbols-outlined">${medalIcon}</span>
    </div>
    <div class="result-rank">${rank}</div>
    <div class="result-message">${message}</div>
    <div class="result-score-card">
      <div class="result-score-row">
        <div class="result-score-label"><span class="material-symbols-outlined">check_circle</span>Bonnes réponses</div>
        <div class="result-score-value highlight">${correct} / ${total}</div>
      </div>
      <div class="result-score-row">
        <div class="result-score-label"><span class="material-symbols-outlined">percent</span>Score</div>
        <div class="result-score-value">${percent}%</div>
      </div>
      <div class="result-score-row">
        <div class="result-score-label"><span class="material-symbols-outlined">schedule</span>Temps</div>
        <div class="result-score-value">${minutes}:${String(seconds).padStart(2,'0')}</div>
      </div>
    </div>
    <div class="result-points">
      <div class="result-points-icon"><span class="material-symbols-outlined">stars</span></div>
      <div class="result-points-text">
        <div class="result-points-label">Points fidélité gagnés</div>
        <div class="result-points-value">+${pointsGained} points</div>
      </div>
    </div>
    ${renderBadgesEarned()}
    <div class="result-actions">
      <button class="btn-primary" onclick="restartSameLevel()">
        <span class="material-symbols-outlined">refresh</span>Rejouer
      </button>
      <button class="btn-secondary" onclick="goToLevels()">
        <span class="material-symbols-outlined">grid_view</span>Choisir un autre niveau
      </button>
    </div>
  </div>`;
  showScreen('screen-results');
}

function renderBadgesEarned() {
  const items = Object.entries(Q.badges).map(([key, b]) => {
    const earned = state.earnedBadges.has(key);
    const color = BADGE_COLORS[key] || b.color;
    return `
      <div class="result-badge ${earned ? 'earned' : 'locked'}"
           style="--badge-color:${color};--badge-bg:${hexToRgba(color,.1)};--badge-shadow:${hexToRgba(color,.2)}">
        <span class="material-symbols-outlined">${b.icon}</span>${b.name}
      </div>`;
  }).join('');
  return `<div class="result-badges"><div class="result-badges-title">Thèmes maîtrisés</div><div class="result-badges-list">${items}</div></div>`;
}

function restartSameLevel() { startLevel(state.levelKey); }
function goToLevels() {
  document.getElementById('header-points').style.display = 'none';
  showScreen('screen-levels');
}
function onBack() {
  const active = document.querySelector('.screen.active').id;
  if (active === 'screen-levels') {
    if (window.parent && window.parent !== window) window.parent.postMessage({ type: 'quiz-close' }, '*');
    else window.history.back();
  } else goToLevels();
}

renderLevels();
</script>
</body>
</html>
