<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#ffffff"/>
<title>Mon compte · Cœur de Ville</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Inter',-apple-system,sans-serif;background:#f7f8fa;color:#0f1923;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5;min-height:100vh;padding-bottom:80px;}

/* HEADER */
.head{background:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e8ec;position:sticky;top:0;z-index:10;}
.head-back{background:none;border:none;color:#0f1923;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.head-back:hover{background:#f4f6f9;}
.head-back .material-symbols-outlined{font-size:22px;}
.head-title{font-size:15px;font-weight:700;color:#0f1923;}
.head-spacer{width:36px;}

/* CONTENT */
.content{max-width:480px;margin:0 auto;padding:18px 16px 40px;}

/* USER CARD */
.user-card{background:#fff;border-radius:14px;padding:18px;display:flex;align-items:center;gap:14px;margin-bottom:18px;border:1px solid #e5e8ec;}
.user-avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#3B5BDB);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:16px;font-weight:700;color:#0f1923;margin-bottom:2px;letter-spacing:-0.005em;}
.user-email{font-size:12px;color:#5a6068;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* LOYALTY CARD */
.loyalty-card{background:linear-gradient(135deg,#FF6B35 0%,#ea580c 100%);border-radius:18px;padding:24px 20px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden;box-shadow:0 8px 24px rgba(255,107,53,0.25);}
.loyalty-card::before{content:'';position:absolute;top:-50%;right:-30%;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,0.08);}
.loyalty-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative;}
.loyalty-brand{font-size:11px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;opacity:0.9;}
.loyalty-ville{font-size:11px;font-weight:600;background:rgba(255,255,255,0.2);padding:3px 9px;border-radius:20px;}
.loyalty-points{font-size:48px;font-weight:900;letter-spacing:-0.03em;line-height:1;margin-bottom:4px;position:relative;}
.loyalty-points-lbl{font-size:13px;font-weight:600;opacity:0.9;margin-bottom:18px;position:relative;}
.loyalty-stats{display:flex;gap:24px;font-size:11px;font-weight:500;opacity:0.9;position:relative;border-top:1px solid rgba(255,255,255,0.2);padding-top:12px;}
.loyalty-stat-num{font-size:14px;font-weight:800;color:#fff;}

/* QR CODE CARD */
.qr-card{background:#fff;border-radius:14px;padding:24px 20px;text-align:center;margin-bottom:18px;border:1px solid #e5e8ec;}
.qr-card-title{font-size:14px;font-weight:700;color:#0f1923;margin-bottom:6px;letter-spacing:-0.005em;}
.qr-card-sub{font-size:12px;color:#5a6068;margin-bottom:18px;}
.qr-code-wrap{display:inline-block;padding:14px;background:#fff;border:1px solid #e5e8ec;border-radius:12px;}
#qr-code{width:200px;height:200px;display:block;}
.qr-placeholder{width:200px;height:200px;background:#f4f6f9;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#a0a8b3;font-size:13px;}

/* SECTION */
.section{background:#fff;border-radius:14px;padding:0;margin-bottom:14px;border:1px solid #e5e8ec;overflow:hidden;}
.section-head{padding:14px 16px 8px;}
.section-title{font-size:11px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#5a6068;}

/* MENU LIST */
.menu-item{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border-top:1px solid #f1f5f9;text-decoration:none;color:#0f1923;}
.menu-item:first-of-type{border-top:none;}
.menu-item:hover{background:#f7f8fa;}
.menu-icon{width:32px;height:32px;border-radius:8px;background:#f4f6f9;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#5a6068;}
.menu-icon .material-symbols-outlined{font-size:18px;}
.menu-icon.danger{background:#fef2f2;color:#dc2626;}
.menu-text{flex:1;font-size:14px;font-weight:500;}
.menu-arrow{color:#a0a8b3;}
.menu-arrow .material-symbols-outlined{font-size:18px;}

/* TRANSACTIONS LIST */
.tx-item{padding:13px 16px;display:flex;align-items:center;gap:12px;border-top:1px solid #f1f5f9;}
.tx-item:first-of-type{border-top:none;}
.tx-icon{width:36px;height:36px;border-radius:50%;background:#dcfce7;color:#15803d;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tx-icon.spent{background:#fef3c7;color:#92400e;}
.tx-icon .material-symbols-outlined{font-size:18px;}
.tx-info{flex:1;min-width:0;}
.tx-merchant{font-size:13px;font-weight:600;color:#0f1923;margin-bottom:2px;}
.tx-date{font-size:11px;color:#5a6068;}
.tx-points{font-size:14px;font-weight:800;color:#15803d;font-variant-numeric:tabular-nums;}
.tx-points.negative{color:#dc2626;}

/* EMPTY */
.empty{text-align:center;padding:30px 20px;color:#5a6068;}
.empty .material-symbols-outlined{font-size:36px;color:#a0a8b3;margin-bottom:8px;}
.empty-title{font-size:13px;font-weight:600;color:#0f1923;margin-bottom:2px;}
.empty-text{font-size:12px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:300;background:#0f1923;color:#fff;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;opacity:0;transition:all 0.25s;pointer-events:none;display:flex;align-items:center;gap:8px;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast .material-symbols-outlined{font-size:18px;color:#4ade80;font-variation-settings:'FILL' 1;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:#a0a8b3;}
.loading .material-symbols-outlined{font-size:32px;animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* AUTH REQUIRED */
.auth-required{text-align:center;padding:40px 20px;}
.auth-required .material-symbols-outlined{font-size:48px;color:#a0a8b3;margin-bottom:14px;}
.auth-required-title{font-size:18px;font-weight:800;color:#0f1923;margin-bottom:6px;}
.auth-required-sub{font-size:13px;color:#5a6068;margin-bottom:20px;line-height:1.5;}
.btn-primary-cta{background:#0f1923;color:#fff;border:none;padding:13px 24px;border-radius:11px;font-family:Inter;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-primary-cta:hover{background:#1a2a3a;}
</style>
</head>
<body>

<header class="head">
  <button class="head-back" onclick="goBack()" title="Retour"><span class="material-symbols-outlined">arrow_back</span></button>
  <div class="head-title">Mon compte</div>
  <div class="head-spacer"></div>
</header>

<main class="content" id="content">
  <div class="loading">
    <span class="material-symbols-outlined">progress_activity</span>
  </div>
</main>

<div class="toast" id="toast">
  <span class="material-symbols-outlined">check_circle</span>
  <span id="toast-msg"></span>
</div>

<script src="cdv-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>

const VILLE = 'villeneuve';

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
async function init() {
  console.log('[CDV compte] Init démarré');

  // Timeout sécurité: si CDV pas chargé après 8s, on affiche une erreur
  const timeout = setTimeout(() => {
    console.error('[CDV compte] Timeout - CDV non chargé après 8s');
    document.getElementById('content').innerHTML = `
      <div class="auth-required">
        <span class="material-symbols-outlined">error</span>
        <div class="auth-required-title">Problème de chargement</div>
        <div class="auth-required-sub">Le module d'authentification n'a pas pu charger. Vérifiez votre connexion internet et rechargez la page.</div>
        <a onclick="location.reload()" class="btn-primary-cta">Recharger</a>
      </div>
    `;
  }, 8000);

  try {
    if (!window.CDV || !window.CDV.getUser) {
      console.log('[CDV compte] Attente du module CDV...');
      // Attend que cdv-auth.js soit chargé
      let tries = 0;
      while ((!window.CDV || !window.CDV.getUser) && tries < 50) {
        await new Promise(r => setTimeout(r, 100));
        tries++;
      }
      if (!window.CDV || !window.CDV.getUser) {
        throw new Error('Module CDV non chargé');
      }
    }

    console.log('[CDV compte] Module CDV OK, recup user...');
    const user = await window.CDV.getUser();
    clearTimeout(timeout);
    console.log('[CDV compte] User reçu:', user);

    if (!user) {
      showAuthRequired();
      return;
    }
    await renderAccount(user);
  } catch (err) {
    clearTimeout(timeout);
    console.error('[CDV compte] Erreur init:', err);
    document.getElementById('content').innerHTML = `
      <div class="auth-required">
        <span class="material-symbols-outlined">error</span>
        <div class="auth-required-title">Erreur</div>
        <div class="auth-required-sub">${escapeHtml(err.message || 'Erreur inconnue')}</div>
        <a onclick="location.reload()" class="btn-primary-cta">Recharger</a>
      </div>
    `;
  }
}

function showAuthRequired() {
  document.getElementById('content').innerHTML = `
    <div class="auth-required">
      <span class="material-symbols-outlined">account_circle</span>
      <div class="auth-required-title">Pas encore connecté</div>
      <div class="auth-required-sub">Connectez-vous ou créez un compte gratuit pour profiter du programme de fidélité.</div>
      <a href="auth.html?redirect=compte.html" class="btn-primary-cta">Se connecter / S'inscrire</a>
    </div>
  `;
}

async function renderAccount(user) {
  // Récupère les points et transactions
  const [points, transactions] = await Promise.all([
    window.CDV.getLoyaltyPoints(VILLE),
    window.CDV.getTransactions(VILLE, 10)
  ]);

  const initial = ((user.first_name || user.email)[0] || '?').toUpperCase();
  const fullName = (user.first_name || user.last_name)
    ? `${user.first_name || ''} ${user.last_name || ''}`.trim()
    : user.email.split('@')[0];

    <!-- USER CARD -->

// ════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════
function renderTransaction(tx) {
  const isEarn = tx.transaction_type === 'earn';
  const merchant = tx.merchants?.business_name || (isEarn ? 'Commerçant partenaire' : 'Récompense');
  const date = new Date(tx.created_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', year: 'numeric' });
  const time = new Date(tx.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

  return `
    <div class="tx-item">
      <div class="tx-icon ${isEarn ? '' : 'spent'}">
        <span class="material-symbols-outlined">${isEarn ? 'add' : 'card_giftcard'}</span>
      </div>
      <div class="tx-info">
        <div class="tx-merchant">${escapeHtml(merchant)}</div>
        <div class="tx-date">${date} · ${time}</div>
      </div>
      <div class="tx-points ${isEarn ? '' : 'negative'}">
        ${isEarn ? '+' : '-'}${tx.points} pts
      </div>
    </div>
  `;
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// ════════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════════
async function doSignOut() {
  if (!confirm('Souhaitez-vous vous déconnecter ?')) return;
  await window.CDV.signOut();
  showToast('Déconnecté');
  setTimeout(() => location.href = 'index.html', 800);
}

function comingSoon() {
  showToast('Bientôt disponible');
}

function goBack() {
  if (history.length > 1) history.back();
  else location.href = 'index.html';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
