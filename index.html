<!DOCTYPE html>
<html lang="fr" style="height:100%;">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Cœur de Ville</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;font-family:'Manrope',sans-serif;background:#f8f8f6;}

/* ── HEADER ── */
#app-header{
  position:fixed;top:0;left:0;right:0;height:48px;z-index:1000;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.06);
  display:flex;align-items:center;padding:0 8px;gap:0;
}
#app-header .h-logo{flex:1;display:flex;justify-content:center;}
#app-header button{background:none;border:none;cursor:pointer;border-radius:50%;padding:6px;display:flex;align-items:center;justify-content:center;}
#app-header button:hover{background:rgba(0,0,0,0.05);}

/* ── MAP ── */
#map-wrap{position:fixed;top:48px;left:0;right:0;bottom:64px;} #map-wrap, #map{width:100%;height:100%;}
#map{width:100%;height:100%;}

/* ── BOTTOM NAV ── */
#bottomnav{
  position:fixed;bottom:0;left:0;right:0;height:64px;z-index:1000;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex;align-items:center;justify-content:space-around;padding:0 8px;
  border-radius:20px 20px 0 0;
}
.n-btn{
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  padding:6px 12px;border-radius:12px;transition:all 0.2s;
  color:#94a3b8;
}
.n-btn span.material-symbols-outlined{font-size:22px;}
.n-btn span.lbl{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}
.n-btn.active{color:#0f1923;}
.n-btn.active span.material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 500;}

/* ── FAB BUTTONS ── */
#map-fabs{
  position:fixed;right:16px;bottom:80px;
  display:flex;flex-direction:column;gap:10px;z-index:500;
}
.fab{
  width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
  background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.15);
  display:flex;align-items:center;justify-content:center;
  color:#0f1923;transition:all 0.2s;
}
.fab:hover{box-shadow:0 4px 16px rgba(0,0,0,0.2);transform:scale(1.05);}
.fab .material-symbols-outlined{font-size:20px;}

/* ── SEARCHBAR ── */
#search-bar-wrap{
  display:none;position:fixed;top:48px;left:0;right:0;z-index:999;
  background:rgba(255,255,255,0.97);backdrop-filter:blur(16px);
  padding:10px 16px;border-bottom:1px solid rgba(0,0,0,0.06);
}
#search-input{
  width:100%;background:#f1f3f4;border:none;border-radius:12px;
  padding:9px 14px 9px 38px;font-size:14px;font-family:Manrope;outline:none;
}

/* ── POPUP CARD — carte flottante style Google Maps ── */
/* Card POI — centrée sur l'écran, style Google Maps */
#popup-container{
  display:none;position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:calc(100% - 32px);max-width:420px;
  z-index:800;
}
#popup-container.active{display:block;}
#popup-card{
  background:#fff;border-radius:20px;width:100%;
  box-shadow:0 12px 48px rgba(0,0,0,0.22);
  opacity:0;transform:scale(0.94);
  transition:opacity 0.22s ease, transform 0.25s cubic-bezier(0.34,1.4,0.64,1);
  overflow:hidden;
}
#popup-card.visible{opacity:1;transform:scale(1);}
/* ── POPUP CARD ── */
.pw{border-radius:20px 20px 0 0;overflow:hidden;background:#fff;}
.pw-img-wrap{position:relative;height:180px;overflow:hidden;}
.pw-img{width:100%;height:100%;object-fit:cover;}
.pw-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.pw-badge{
  position:absolute;top:12px;left:12px;
  color:#fff;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;
  padding:4px 10px;border-radius:20px;backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.35);
}
.pw-x{
  position:absolute;top:12px;right:12px;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);
  border:none;border-radius:50%;width:30px;height:30px;color:#0f1923;
  font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
.pw-body{padding:16px 18px 8px;}
.pw-name{font-size:19px;font-weight:800;color:#0f1923;margin-bottom:3px;line-height:1.2;}
.pw-cat-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.pw-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pw-cat-label{font-size:12px;font-weight:600;color:#6b7280;}
.pw-dist{font-size:12px;color:#94a3b8;margin-left:auto;}
.pw-desc{font-size:13px;color:#4b5563;line-height:1.6;margin-bottom:14px;}
.pw-actions{display:flex;gap:8px;padding:0 18px 20px;}
.pw-btn{
  flex:1;border:none;border-radius:14px;padding:12px 8px;
  font-family:Manrope;font-size:12px;font-weight:700;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  transition:all 0.15s;
}
.pw-btn:active{transform:scale(0.96);}
.pw-btn .material-symbols-outlined{font-size:20px;}
.pw-btn-primary{background:#0f1923;color:#fff;}
.pw-btn-secondary{background:#f1f5f9;color:#0f1923;}
.pw-btn-sv{background:#1a73e8;color:#fff;}
.pw-era{display:none;}
.pw-cta,.pw-nav,.pw-sv-btn{display:none;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(15,25,35,0.9);color:#fff;padding:8px 20px;border-radius:20px;
  font-size:13px;font-family:Manrope;font-weight:600;
  opacity:0;transition:all 0.3s;z-index:9000;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── ROUTE BANNER ── */
#route-banner{
  position:fixed;bottom:72px;left:16px;right:16px;z-index:700;
  background:#fff;border-radius:16px;padding:14px 16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  display:flex;align-items:center;gap:12px;
}

/* ── FILTER BAR (caché mais nécessaire pour ui.js) ── */
#filter-bar{display:none;}

/* ── LEAFLET OVERRIDES ── */
.leaflet-control-zoom{border:none!important;box-shadow:none!important;display:none;}
.yah-ring{position:absolute;width:44px;height:44px;border-radius:50%;border:2px solid #3B5BDB;animation:yah-pulse 2s infinite;}
.yah-dot{position:absolute;width:16px;height:16px;border-radius:50%;background:#3B5BDB;border:2px solid #fff;box-shadow:0 2px 8px rgba(59,91,219,0.5);}
.yah-label{font-family:Manrope;font-size:10px;font-weight:700;color:#3B5BDB;margin-top:2px;}
@keyframes yah-pulse{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.4);opacity:0;}}

/* ── IMMERSIVE (placeholder) ── */
#imm-overlay{display:none;position:fixed;inset:0;z-index:2000;background:#0f1923;flex-direction:column;}
#imm-overlay.open{display:flex;}
#imm-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 0.8s;opacity:0;}
#imm-bg.ready{opacity:1;}
#imm-tint{position:absolute;inset:0;opacity:0;transition:opacity 0.8s;}
#imm-tint.ready{opacity:1;}
#imm-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.imm-particle{position:absolute;border-radius:50%;animation:float-up linear infinite;}
@keyframes float-up{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-80vh);opacity:0;}}
#imm-overlay.ready #imm-content{opacity:1;transform:translateY(0);}
#imm-content{
  position:relative;z-index:10;display:flex;flex-direction:column;
  height:100%;padding:60px 24px 40px;
  opacity:0;transform:translateY(30px);transition:all 0.6s 0.3s;
}
#imm-era-badge{
  font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--acc);background:rgba(255,255,255,0.1);
  padding:4px 10px;border-radius:6px;width:fit-content;margin-bottom:12px;
}
#imm-title{font-size:28px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:4px;}
#imm-subtitle{font-size:11px;font-weight:600;letter-spacing:0.15em;color:rgba(255,255,255,0.5);margin-bottom:20px;}
#imm-stats{display:flex;gap:20px;margin-bottom:24px;}
.imm-stat{display:flex;flex-direction:column;gap:2px;}
.imm-stat-val{font-size:20px;font-weight:800;color:var(--acc);}
.imm-stat-lbl{font-size:10px;color:rgba(255,255,255,0.5);font-weight:500;}
#imm-narration-text{
  font-size:15px;line-height:1.7;color:rgba(255,255,255,0.85);font-weight:300;font-style:italic;
  max-width:400px;flex:1;
  opacity:0;transform:translateY(14px);transition:opacity 0.8s,transform 0.8s;
}
#imm-narration-text.visible{opacity:1;transform:translateY(0);}
#imm-cursor{display:inline-block;width:2px;height:1em;background:var(--acc);margin-left:2px;animation:blink 1s infinite;}
#imm-cursor.done{animation:none;opacity:0;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes spin{to{transform:rotate(360deg);}}
#imm-actions{display:flex;gap:10px;margin-top:20px;}
#imm-navigate-btn{
  background:var(--acc);color:#fff;border:none;border-radius:14px;
  padding:12px 24px;font-family:Manrope;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:8px;
}
#imm-close-btn{
  background:rgba(255,255,255,0.12);color:#fff;border:none;border-radius:14px;
  padding:12px 16px;font-family:Manrope;font-size:14px;cursor:pointer;
  display:flex;align-items:center;gap:6px;
}
#imm-scroll{
  background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;
  display:flex;align-items:center;gap:6px;font-family:Manrope;font-size:12px;margin-top:12px;
}
#imm-detail{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(15,25,35,0.97);backdrop-filter:blur(20px);
  border-radius:24px 24px 0 0;padding:20px 20px 40px;
  transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.34,1.2,0.64,1);
  z-index:20;max-height:70vh;overflow-y:auto;
}
#imm-detail.open{transform:translateY(0);}
.imm-detail-section{margin-bottom:20px;}
.imm-detail-section h4{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.imm-detail-section p{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.8);}
.imm-timeline{display:flex;flex-direction:column;gap:12px;}
.imm-tl-item{display:flex;align-items:flex-start;gap:12px;}
.imm-tl-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:4px;}
.imm-tl-year{font-size:12px;font-weight:700;color:var(--acc);width:40px;flex-shrink:0;}
.imm-tl-text{font-size:13px;color:rgba(255,255,255,0.7);}

/* ── AR VIEW ── */
#ar-view{display:none;position:fixed;inset:0;z-index:3000;background:#000;}
#ar-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#ar-epoch-banner{
  position:absolute;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
  color:#fff;font-family:Manrope;font-size:12px;font-weight:600;
  padding:6px 16px;border-radius:20px;white-space:nowrap;z-index:10;
}
#ar-hud{position:absolute;top:0;left:0;right:0;z-index:10;padding:16px;}
#ar-hud-inner{display:flex;align-items:center;gap:12px;}
.ar-compass{width:32px;height:32px;}
#ar-heading-text{color:#fff;font-family:Manrope;font-size:13px;font-weight:600;flex:1;}
#ar-close-btn{background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:32px;height:32px;color:#fff;cursor:pointer;font-size:16px;}
#ar-distance-ring{
  position:absolute;bottom:160px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.6);color:#fff;font-family:Manrope;font-size:12px;
  padding:6px 14px;border-radius:20px;z-index:10;
}
#ar-bottom-bar{
  position:absolute;bottom:72px;left:16px;right:16px;z-index:10;
  display:flex;gap:10px;
}
#ar-radar-btn,#ar-ghost-btn,#ar-nearest-btn{
  flex:1;background:rgba(255,255,255,0.12);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.2);border-radius:14px;
  color:#fff;font-family:Manrope;font-size:11px;font-weight:600;
  padding:10px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;
}
#ar-grain,#ar-vignette,#ar-ghost-ov,#ar-flash,#ar-ov{position:absolute;inset:0;pointer-events:none;}
#ar-grain{background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.4;}
#ar-vignette{background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.5) 100%);}

/* ── NAV OVERLAY ── */
#nav-overlay{display:none;position:fixed;top:48px;left:16px;right:16px;z-index:600;background:#fff;border-radius:16px;padding:14px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.15);}
#nav-overlay.on{display:flex;align-items:center;gap:12px;}

/* ── HIST LIGHTBOX ── */
#hist-lightbox{display:none;position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,0.95);flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#hist-lightbox.open{display:flex;}
#hist-lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;}
#hist-lightbox-label{color:rgba(255,255,255,0.5);font-family:Manrope;font-size:12px;}
#hist-lightbox-img{max-width:90vw;max-height:60vh;border-radius:12px;object-fit:contain;}
#hist-lightbox-caption{color:rgba(255,255,255,0.7);font-family:Manrope;font-size:13px;text-align:center;max-width:320px;line-height:1.5;}

/* ── RADAR ── */
#radar-overlay{display:none;position:fixed;inset:0;z-index:3500;background:rgba(5,10,20,0.97);flex-direction:column;align-items:center;justify-content:center;}
#radar-overlay.open{display:flex;}

/* ── FP chips (hidden but functional) ── */
.fp,.fdot{display:none;}


</style>
</head>

<script>
// ── UI ──
// ═══════════════════════════════════════════════════════════
// CORE/UI.JS — Google Maps SDK natif
// ═══════════════════════════════════════════════════════════



let map, userMarker, routePolyline, routeActive = false;
let userLat = CONFIG.lat, userLng = CONFIG.lng;
let currentSection = 'tourisme';
let navActive = false, navDestLat = null, navDestLng = null;
let selectedRadarPlace = null;
let immTypewriterTimer = null;
let gpsWatchId = null;
let allMarkers = [];
let routeMarkers = [];

// ─── INIT CARTE ───────────────────────────────────────────────
function initMap() {
  document.title = CONFIG.titre;
  document.getElementById('ar-epoch-banner').textContent = CONFIG.epochBanner;

  map = L.map('map', {
    center: [CONFIG.lat, CONFIG.lng],
    zoom: CONFIG.zoom,
    zoomControl: true,
    attributionControl: false,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 20,
    attribution: '© OpenStreetMap © CARTO'
  }).addTo(map);


  map.zoomControl.setPosition('bottomright');
  buildFilterBar();
  renderPlaces('tourisme');
  initEvenementsMarkers();
  map.on('click', () => closeCustomPopup());

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => {
      userLat = p.coords.latitude;
      userLng = p.coords.longitude;
      userMarker = L.marker([userLat, userLng], { icon: makeUserMarkerIcon() }).addTo(map);
    }, () => {});
  }

  window.leafletMap = map;
}

function makeUserMarkerIcon() {
  return L.divIcon({
    html: '<div style="display:flex;flex-direction:column;align-items:center;"><div style="position:relative;display:flex;align-items:center;justify-content:center;width:44px;height:44px;"><div class=\"yah-ring\"></div><div class=\"yah-dot\"></div></div><div class=\"yah-label\">Vous</div></div>',
    className: '', iconSize: [80, 60], iconAnchor: [40, 22],
  });
}

// ─── BARRE DE FILTRES ─────────────────────────────────────────
function buildFilterBar() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  const cats = [...new Set(PLACES.map(p => p.cat))];
  const allBtn = document.createElement('button');
  allBtn.className = 'fp active';
  allBtn.style.setProperty('--cc', CONFIG.couleurPrimaire);
  allBtn.innerHTML = '<span class="fdot" style="background:' + CONFIG.couleurPrimaire + '"></span>Tout';
  allBtn.onclick = () => { filterPlaces(null); setFilterActive(allBtn); };
  bar.appendChild(allBtn);
  cats.forEach(cat => {
    const c = CATS[cat]; if (!c) return;
    const btn = document.createElement('button');
    btn.className = 'fp';
    btn.style.setProperty('--cc', c.color);
    btn.innerHTML = '<span class="fdot" style="background:' + c.dot + '"></span>' + c.label;
    btn.onclick = () => { filterPlaces(cat); setFilterActive(btn); };
    bar.appendChild(btn);
  });
}

function setFilterActive(el) {
  document.querySelectorAll('.fp').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ─── MARKERS ─────────────────────────────────────────────────

function makePinSVG(color) {
  return '<svg width="28" height="40" viewBox="0 0 28 40" xmlns="http://www.w3.org/2000/svg"><path d="M14 0C6.27 0 0 6.27 0 14c0 9.33 14 26 14 26S28 23.33 28 14C28 6.27 21.73 0 14 0z" fill="' + color + '"/><circle cx="14" cy="14" r="6" fill="white" opacity="0.9"/></svg>';
}

function renderPlaces(section) {
  allMarkers.forEach(m => map.removeLayer(m)); allMarkers = [];
  const list = section === 'commerce' ? COMMERCES : PLACES;
  list.forEach(place => {
    const col = CATS[place.cat]?.color || CONFIG.couleurPrimaire;
    const icon = L.divIcon({ html: makePinSVG(col), className: '', iconSize: [28, 40], iconAnchor: [14, 40] });
    const m = L.marker([place.lat, place.lng], { icon });
    m.on('click', () => openCustomPopup(buildPopupHTML(place)));
    m.addTo(map); allMarkers.push(m);
  });
}

function filterPlaces(cat) {
  allMarkers.forEach(m => map.removeLayer(m)); allMarkers = [];
  const list = currentSection === 'commerce' ? COMMERCES : PLACES;
  const filtered = cat ? list.filter(p => p.cat === cat) : list;
  filtered.forEach(place => {
    const col = CATS[place.cat]?.color || CONFIG.couleurPrimaire;
    const icon = L.divIcon({ html: makePinSVG(col), className: '', iconSize: [28, 40], iconAnchor: [14, 40] });
    const m = L.marker([place.lat, place.lng], { icon });
    m.on('click', () => openCustomPopup(buildPopupHTML(place)));
    m.addTo(map); allMarkers.push(m);
  });
}

// ─── POPUP ────────────────────────────────────────────────────
function buildPopupHTML(place) {
  const col = CATS[place.cat]?.color || '#333';
  const label = CATS[place.cat]?.label || '';
  const dist = calcDist(userLat, userLng, place.lat, place.lng);
  const dTxt = dist < 1000 ? Math.round(dist) + 'm' : (dist / 1000).toFixed(1) + 'km';
  const isPlace = !!PLACES.find(p => p.id === place.id);

  const thumb = place.bg
    ? '<img style="width:80px;height:80px;object-fit:cover;border-radius:14px;flex-shrink:0;" src="' + place.bg + '" alt=""/>'
    : '<div style="width:80px;height:80px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,' + col + '22,' + col + '44;display:flex;align-items:center;justify-content:center;"><span class="material-symbols-outlined" style="font-size:28px;color:' + col + ';opacity:0.7;">location_on</span></div>';

  return '<div style="padding:14px 14px 6px;display:flex;gap:14px;align-items:flex-start;">' +
    thumb +
    '<div style="flex:1;min-width:0;">' +
    '<div style="font-size:15px;font-weight:800;color:#0f1923;line-height:1.25;margin-bottom:4px;">' + place.name + '</div>' +
    '<div style="display:flex;align-items:center;gap:5px;margin-bottom:5px;">' +
    '<div style="width:7px;height:7px;border-radius:50%;background:' + col + ';flex-shrink:0;"></div>' +
    '<span style="font-size:11px;font-weight:600;color:' + col + ';">' + label + '</span>' +
    (place.era ? '<span style="font-size:11px;color:#94a3b8;"> · ' + place.era + '</span>' : '') +
    '<span style="font-size:11px;color:#94a3b8;margin-left:auto;">' + dTxt + '</span>' +
    '</div>' +
    '<div style="font-size:12px;color:#6b7280;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">' + place.desc + '</div>' +
    (place.horaires ? '<div style="font-size:11px;color:#94a3b8;margin-top:4px;">' + place.horaires + '</div>' : '') +
    '</div>' +
    '<button onclick="closeCustomPopup()" style="background:none;border:none;cursor:pointer;padding:0;flex-shrink:0;color:#94a3b8;line-height:1;">' +
    '<span class="material-symbols-outlined" style="font-size:18px;">close</span></button>' +
    '</div>' +
    '<div style="display:flex;border-top:1px solid #f1f5f9;margin:0 14px;">' +
    (isPlace ? '<button onclick="closeCustomPopup();openImmersive(' + place.id + ')" style="flex:1;background:none;border:none;cursor:pointer;padding:10px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;color:#0f1923;font-family:Manrope;font-size:10px;font-weight:700;border-right:1px solid #f1f5f9;"><span class="material-symbols-outlined" style="font-size:18px;">auto_awesome</span>Découvrir</button>' : '') +

function startRoute(lat, lng) {
  if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }

  document.getElementById('route-banner')?.remove();
  showToast('Calcul des itinéraires…');

    pos => { userLat = pos.coords.latitude; userLng = pos.coords.longitude; _computeRoute(parseFloat(lat), parseFloat(lng)); },
    () => _computeRoute(parseFloat(lat), parseFloat(lng)),
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

function _computeRoute(dLat, dLng) {
  fetch('https://router.project-osrm.org/route/v1/foot/' + userLng + ',' + userLat + ';' + dLng + ',' + dLat + '?overview=full&geometries=geojson')
    .then(r => r.json()).then(data => {
      const foot = data.routes?.[0]; if (!foot) { showToast('Introuvable'); return; }
      const coords = foot.geometry.coordinates.map(c => [c[1], c[0]]);
      routePolyline = L.polyline(coords, { color: CONFIG.couleurPrimaire, weight: 5, opacity: 0.85, lineCap: 'round', lineJoin: 'round' }).addTo(map);
      const sIcon = L.divIcon({ html: '<div style="width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid #0f1923"></div>', className: '', iconSize: [14,14], iconAnchor: [7,7] });
      const eIcon = L.divIcon({ html: '<div style="width:16px;height:16px;border-radius:50%;background:#0f1923;border:3px solid #fff"></div>', className: '', iconSize: [16,16], iconAnchor: [8,8] });
      const sM = L.marker([userLat, userLng], { icon: sIcon }).addTo(map);
      const eM = L.marker([dLat, dLng], { icon: eIcon }).addTo(map);
      routeMarkers = [sM, eM];
      map.fitBounds(routePolyline.getBounds(), { padding: [60, 60] });
      routeActive = true;
      const distKm = foot.distance / 1000;
      const footDist = foot.distance < 1000 ? Math.round(foot.distance) + 'm' : distKm.toFixed(1) + 'km';
      const footTime = Math.max(1, Math.round(distKm / 7.5 * 60)) + ' min';
      const carDistKm = calcDist(userLat, userLng, dLat, dLng) * 1.35 / 1000;
      const carDist = carDistKm < 1 ? Math.round(carDistKm * 1000) + 'm' : carDistKm.toFixed(1) + 'km';
      const carTime = Math.max(2, Math.round(carDistKm / 40 * 60)) + ' min';
      _showRouteBanner(footTime, footDist, carTime, carDist);
    }).catch(() => showToast('Erreur réseau'));
}

function _showRouteBanner(footTime, footDist, carTime, carDist) {
  document.getElementById('route-banner')?.remove();
  const banner = document.createElement('div'); banner.id = 'route-banner';

9 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>Annuler</button>';
  (document.querySelector('main') || document.body).appendChild(banner);
  showToast('Itinéraires calculés');

function cancelRoute() {
  if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
  routeMarkers.forEach(m => map.removeLayer(m)); routeMarkers = [];

  routeActive = false; showToast('Itinéraire annulé');

let _toastTimer;
function showToast(msg) {

  _toastTimer = setTimeout(() => t.classList.remove('show'), 2500);

// ─── UTILS ────────────────────────────────────────────────────
function calcDist(la1, lo1, la2, lo2) {
  const R = 6371000, r = Math.PI / 180;
  const dla = (la2-la1)*r, dlo = (lo2-lo1)*r;
  return R*2*Math.asin(Math.sqrt(Math.sin(dla/2)**2+Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dlo/2)**2));
}

function getBearing(la1, lo1, la2, lo2) {
  const dlo = (lo2-lo1)*Math.PI/180;
  const y = Math.sin(dlo)*Math.cos(la2*Math.PI/180);
  const x = Math.cos(la1*Math.PI/180)*Math.sin(la2*Math.PI/180)-Math.sin(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.cos(dlo);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

<script>
// ── AR ──
// ═══════════════════════════════════════════════════════════
// CORE/AR.JS — Logique AR, Radar, Ghost Mode, Gyroscope
// ═══════════════════════════════════════════════════════════

let arStream = null;
let arActive = false;
let arHeading = 0;
let rawH = 0;
let heading = 0;
let calibOffset = 0;
let ghostMode = false;
let arRAF = null;

// ─── DÉMARRAGE AR ─────────────────────────────────────────────
function startAR() {
  document.getElementById('nav-ar').classList.add('active');
  document.querySelectorAll('.n-btn:not(#nav-ar)').forEach(b => b.classList.remove('active'));

  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(perm => {
      if (perm === 'granted') window.addEventListener('deviceorientation', handleOrientation, true);
    }).catch(() => {
      window.addEventListener('deviceorientation', handleOrientation, true);
    });
  } else {
    window.addEventListener('deviceorientationabsolute', handleOrientation, true);
    window.addEventListener('deviceorientation', handleOrientation, true);
  }

  _startARAsync();
}

async function _startARAsync() {
  try {
    arStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: 'environment' } }, audio: false });
  } catch {
    try {
      arStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    } catch {
      showToast('Caméra non disponible');
      return;
    }
  }

  document.getElementById('ar-video').srcObject = arStream;
  document.getElementById('ar-view').classList.add('on');
  document.getElementById('ar-distance-ring').textContent = 'Recherche GPS…';

  const pill = document.getElementById('ar-distance-ring');
  let gpsReady = false;

  navigator.geolocation?.watchPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    if (!gpsReady) {
      gpsReady = true;
      pill.textContent = `GPS · ${pos.coords.accuracy.toFixed(0)}m`;
    }
  }, () => { pill.textContent = 'GPS erreur'; }, { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });

  arActive = true;
  heading = rawH;
  arLoop();
}

// ─── ARRÊT AR ─────────────────────────────────────────────────
function stopAR() {
  arActive = false;
  if (arRAF) { cancelAnimationFrame(arRAF); arRAF = null; }
  if (arStream) { arStream.getTracks().forEach(t => t.stop()); arStream = null; }
  if (ghostMode) { ghostMode = false; _applyGhostMode(false); }
  window.removeEventListener('deviceorientationabsolute', handleOrientation, true);
  window.removeEventListener('deviceorientation', handleOrientation, true);
  document.getElementById('ar-view').classList.remove('on');
  document.getElementById('ar-video').srcObject = null;
  document.getElementById('ar-ov').innerHTML = '';
  document.getElementById('nav-ar').classList.remove('active');
}

// ─── BOUCLE AR ────────────────────────────────────────────────
function arLoop() {
  if (!arActive) return;

  heading = lerpAngle(heading, rawH, 0.08);

  const ov = document.getElementById('ar-ov');
  const W = ov.clientWidth;
  const H = ov.clientHeight;
  const FOV = CONFIG.arFOV || 100;

  document.getElementById('ar-heading-text').textContent = Math.round(heading) + '° · AR Live';
  ov.innerHTML = '';

  const poisWithDist = PLACES.map(p => ({
    ...p, dist: calcDist(userLat, userLng, p.lat, p.lng),
  })).sort((a, b) => b.dist - a.dist);

  poisWithDist.forEach(poi => {
    if (poi.dist > (CONFIG.arRayonMax || 2000)) return;

    const bear = getBearing(userLat, userLng, poi.lat, poi.lng);
    let diff = bear - heading;
    while (diff > 180) diff -= 360;
    while (diff < -180) diff += 360;
    if (Math.abs(diff) > FOV / 2) return;

    const x = W / 2 + (diff / (FOV / 2)) * (W / 2);
    const ratio = Math.pow(Math.min(poi.dist / 800, 1), 0.5);
    const y = H * 0.72 - ratio * (H * 0.54);
    const scale = 1.5 - ratio * 1.1;
    const opacity = 1.0 - ratio * 0.45;
    const col = CATS[poi.cat]?.color || '#333';
    const distTxt = poi.dist < 1000 ? Math.round(poi.dist) + 'm' : (poi.dist / 1000).toFixed(1) + 'km';

    const el = document.createElement('div');
    el.className = 'arc';
    el.style.cssText = `position:absolute;left:${x.toFixed(1)}px;top:${y.toFixed(1)}px;transform:translateX(-50%) scale(${scale.toFixed(3)});transform-origin:bottom center;opacity:${opacity.toFixed(2)};--cc:${col};`;
    el.innerHTML = `
      <div class="arc-bubble" style="--cc:${col}">
        <div class="arc-icon" style="background:${col};border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2C8 2 4 5 4 9c0 5 8 13 8 13s8-8 8-13c0-4-4-7-8-7z"/></svg>
        </div>
        <div class="arc-info">
          <div class="arc-name">${poi.name}</div>
          <div class="arc-dist">${distTxt}</div>
        </div>
      </div>
      <div class="arc-stem"></div>
      <div class="arc-dot" style="--cc:${col}"></div>`;

    el.onclick = () => { stopAR(); setTimeout(() => openImmersive(poi.id), 300); };
    ov.appendChild(el);
  });

  arRAF = requestAnimationFrame(arLoop);
}

// ─── ORIENTATION ──────────────────────────────────────────────
function handleOrientation(e) {
  let raw = 0;
  if (typeof e.webkitCompassHeading === 'number' && e.webkitCompassHeading >= 0) {
    raw = e.webkitCompassHeading;
  } else if (e.absolute === true && e.alpha != null) {
    raw = (360 - e.alpha) % 360;
  } else if (e.alpha != null) {
    raw = (360 - e.alpha) % 360;
  }
  window._rawCompass = raw;
  rawH = (raw - calibOffset + 360) % 360;
  arHeading = rawH;
}

function lerpAngle(cur, tgt, t) {
  let d = tgt - cur;
  while (d > 180) d -= 360;
  while (d < -180) d += 360;
  return (cur + d * t + 360) % 360;
}

// ─── GHOST MODE ───────────────────────────────────────────────
function toggleGhostMode() {
  ghostMode = !ghostMode;
  _applyGhostMode(ghostMode);
  const btn = document.getElementById('ar-ghost-btn');
  if (ghostMode) {
    btn.classList.add('active');
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 15,15"/></svg> Époque active`;
    document.getElementById('ar-epoch-banner').classList.add('on');
    showToast('Mode Histoire activé');
  } else {
    btn.classList.remove('active');
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 15,15"/></svg> Mode Histoire`;
    document.getElementById('ar-epoch-banner').classList.remove('on');
  }
}

function _applyGhostMode(on) {
  const video    = document.getElementById('ar-video');
  const grain    = document.getElementById('ar-grain');
  const vignette = document.getElementById('ar-vignette');
  const scratches= document.getElementById('ar-scratches');
  const ghostOv  = document.getElementById('ar-ghost-ov');
  if (on) {
    video.classList.add('ghost-mode');
    grain.classList.add('on');
    vignette.classList.add('on');
    if (scratches) scratches.classList.add('on');
    ghostOv.classList.add('on');
    const flash = document.getElementById('ar-flash');
    flash.classList.remove('flash');
    void flash.offsetWidth;
    flash.classList.add('flash');
  } else {
    video.classList.remove('ghost-mode');
    grain.classList.remove('on');
    vignette.classList.remove('on');
    if (scratches) scratches.classList.remove('on');
    ghostOv.classList.remove('on');
  }
}

// ─── RADAR ────────────────────────────────────────────────────
function openRadar() {
  stopAR();
  document.getElementById('radar-view').classList.add('on');
  startGPSWatch();
  setTimeout(drawRadar, 100);
}

function closeRadar() {
  document.getElementById('radar-view').classList.remove('on');
  document.getElementById('radar-info').classList.add('hidden');
  selectedRadarPlace = null;
}

function drawRadar() {
  if (!document.getElementById('radar-view').classList.contains('on')) return;

  const canvas = document.getElementById('radar-canvas');
  const wrap   = document.getElementById('radar-canvas-wrap');
  const size   = Math.min(wrap.clientWidth, wrap.clientHeight - 20);
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx = size / 2, cy = size / 2, r = size / 2 - 10;

  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grad.addColorStop(0, 'rgba(26,115,232,0.08)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

  [0.33, 0.66, 1].forEach((f, i) => {
    ctx.beginPath(); ctx.arc(cx, cy, r * f, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(26,115,232,${0.15 - i * 0.03})`; ctx.lineWidth = 1; ctx.stroke();
    const labels = ['200m', '500m', '1km'];
    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '10px Manrope'; ctx.textAlign = 'center';
    ctx.fillText(labels[i], cx, cy - r * f + 14);
  });

  [['N', 0], ['E', 90], ['S', 180], ['O', 270]].forEach(([l, a]) => {
    const rad = a * Math.PI / 180;
    ctx.fillStyle = a === 0 ? '#e74c3c' : 'rgba(255,255,255,0.5)';
    ctx.font = 'bold 11px Manrope'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(l, cx + Math.sin(rad) * (r + 2), cy - Math.cos(rad) * (r + 2));
  });

  const sweep = (Date.now() / 3000) % 1 * Math.PI * 2;
  ctx.save();
  ctx.translate(cx, cy); ctx.rotate(sweep);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, r, -Math.PI / 2, -Math.PI / 2 + 0.8, false);
  ctx.fillStyle = 'rgba(26,115,232,0.15)'; ctx.fill();
  ctx.restore();

  ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI * 2);
  ctx.fillStyle = '#0f1923'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#fff'; ctx.fill();

  const pinsLayer = document.getElementById('radar-pins-layer');
  pinsLayer.innerHTML = '';
  pinsLayer.style.cssText = 'position:absolute;inset:0;pointer-events:auto';
  const maxDist = CONFIG.radarRayonMax || 1000;

  PLACES.forEach(place => {
    const dist = calcDist(userLat, userLng, place.lat, place.lng);
    if (dist > maxDist * 1.5) return;
    const bearing = getBearing(userLat, userLng, place.lat, place.lng);
    const normDist = Math.min(dist / maxDist, 1);
    const rad = bearing * Math.PI / 180;
    const px = cx + Math.sin(rad) * normDist * r;
    const py = cy - Math.cos(rad) * normDist * r;
    const col = CATS[place.cat]?.color || '#1a73e8';
    const dTxt = dist < 1000 ? Math.round(dist) + 'm' : (dist / 1000).toFixed(1) + 'km';

    const pin = document.createElement('div');
    pin.className = 'radar-pin';
    pin.style.cssText = `left:${px}px;top:${py}px;`;
    pin.innerHTML = `
      <div class="radar-pin-dot" style="background:${col};color:${col}"></div>
      <div class="radar-pin-label">${place.name}<br><span class="radar-pin-dist">${dTxt}</span></div>`;
    pin.onclick = () => selectRadarPlace(place, col, dTxt);
    pinsLayer.appendChild(pin);
  });

  requestAnimationFrame(drawRadar);
}

function selectRadarPlace(place, col, dTxt) {
  selectedRadarPlace = place;
  const info = document.getElementById('radar-info');
  info.classList.remove('hidden');
  document.getElementById('radar-info-icon').innerHTML = `
    <div style="width:40px;height:40px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2C8 2 4 5 4 9c0 5 8 13 8 13s8-8 8-13c0-4-4-7-8-7z"/></svg>
    </div>`;
  document.getElementById('radar-info-name').textContent = place.name;
  document.getElementById('radar-info-dist').textContent = `${dTxt} · ${CATS[place.cat]?.label || ''}`;
}

function navigateToSelected() {
  if (!selectedRadarPlace) return;
  closeRadar();
  startNavigation(selectedRadarPlace);
}

function navigateToNearest() {
  const nearest = PLACES.reduce((best, p) => {
    const d = calcDist(userLat, userLng, p.lat, p.lng);
    return d < best.d ? { d, p } : best;
  }, { d: Infinity, p: null });
  if (nearest.p) { stopAR(); startNavigation(nearest.p); }
}

// ─── LIGHTBOX HISTORIQUE ──────────────────────────────────────
function openHistLightbox(src, caption) {
  document.getElementById('hist-lightbox-img').src = src;
  document.getElementById('hist-lightbox-caption').textContent = caption;
  document.getElementById('hist-lightbox').classList.add('on');
}

function closeHistLightbox() {
  document.getElementById('hist-lightbox').classList.remove('on');
}

</script>

// ── STREET VIEW via Mapillary (open source, sans clé Google) ──
function openStreetView(lat, lng, name) {
  if (lat == null) {
    const ctr = window.leafletMap ? window.leafletMap.getCenter() : {lat:43.9671,lng:4.7896};
    lat = ctr.lat; lng = ctr.lng; name = 'Vue actuelle';
  }
  lat = parseFloat(lat); lng = parseFloat(lng);
  const modal = document.getElementById('sv-modal');
  document.getElementById('sv-title').textContent = name || 'Street View';
  document.getElementById('sv-unavail').style.display = 'none';
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';

  const pano = document.getElementById('sv-pano');
  pano.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"><div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div></div>';

  // Google Maps Street View embed — URL publique sans clé API
  // Format : /maps?q=lat,lng&layer=c active directement Street View
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;border:none;';
  iframe.allowFullscreen = true;
  // Utilise l'URL d'embed public Google Maps en mode Street View
  iframe.src = 'https://www.google.com/maps?q='+lat+','+lng+'&layer=c&cbll='+lat+','+lng+'&cbp=12,0,,0,0&output=svembed';
  iframe.onload = () => { pano.innerHTML = ''; pano.appendChild(iframe); };
  pano.appendChild(iframe);
}

function showSVUnavail() {
  document.getElementById('sv-unavail').style.display = 'flex';
}

function closeSV() {
  document.getElementById('sv-modal').style.display = 'none';
  document.body.style.overflow = '';
  document.getElementById('sv-pano').innerHTML = '';
  if (window._mlyViewer) { try { window._mlyViewer.remove(); } catch(e){} window._mlyViewer = null; }
}

window.openStreetView = openStreetView;
window.closeStreetView = closeSV;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSV(); });
</script>
