<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Cœur de Ville</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:'Manrope',sans-serif;background:#faf9f7;color:#1a1a1a;min-height:100vh;}

#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-logo{width:180px;filter:invert(1);animation:sup 0.6s ease 0.1s both;}
.splash-tag{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.22em;text-transform:uppercase;margin-top:20px;animation:sfade 0.5s ease 0.4s both;}
.splash-bar{position:absolute;bottom:56px;width:36px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.splash-fill{height:100%;background:rgba(255,255,255,0.6);border-radius:2px;animation:sload 1.3s cubic-bezier(0.4,0,0.2,1) 0.3s both;}
@keyframes sup{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
@keyframes sfade{from{opacity:0;}to{opacity:1;}}
@keyframes sload{0%{width:0;}60%{width:65%;}100%{width:100%;}}

#selector{display:none;flex-direction:column;min-height:100vh;padding-bottom:48px;}

.sel-header{
  padding:52px 24px 40px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  background:#fff;border-bottom:1px solid #f0ece8;
}
.sel-logo{height:32px;object-fit:contain;}
.sel-title{font-size:24px;font-weight:900;color:#0f1923;text-align:center;letter-spacing:-0.03em;}
.sel-sub{font-size:13px;color:#9ca3af;text-align:center;font-weight:500;max-width:260px;line-height:1.6;}

.sec-label{padding:28px 20px 14px;display:flex;align-items:center;gap:10px;}
.sec-dot{width:7px;height:7px;border-radius:50%;background:#0f1923;flex-shrink:0;}
.sec-dot.grey{background:#d1d5db;}
.sec-txt{font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:#6b7280;}
.sec-line{flex:1;height:1px;background:#e5e7eb;}

.villes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;}

.ville-card{
  border-radius:20px;overflow:hidden;position:relative;height:190px;
  cursor:pointer;box-shadow:0 2px 16px rgba(0,0,0,0.08);
  transition:transform 0.18s cubic-bezier(0.22,1,0.36,1),box-shadow 0.18s ease;
  background:#e8e4e0;
}
.ville-card:not(.locked):active{transform:scale(0.96);}
.ville-card:not(.locked):hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.15);}
.ville-card.locked{cursor:default;opacity:0.75;}

.ville-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 0.35s ease;}
.ville-card:not(.locked):hover .ville-bg{transform:scale(1.05);}
.ville-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.72) 0%,rgba(0,0,0,0.08) 60%,transparent 100%);}
.ville-card.locked .ville-overlay{background:rgba(0,0,0,0.45);}

.ville-badge{
  position:absolute;top:12px;right:12px;
  font-size:8px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;
  padding:5px 10px;border-radius:20px;backdrop-filter:blur(8px);
}
.badge-actif{background:rgba(39,174,96,0.92);color:#fff;}
.badge-bientot{background:rgba(0,0,0,0.28);color:rgba(255,255,255,0.65);}

.ville-body{position:absolute;bottom:0;left:0;right:0;padding:14px;}
.ville-name{font-size:14px;font-weight:900;color:#fff;line-height:1.2;letter-spacing:-0.01em;}
.ville-dept{font-size:10px;color:rgba(255,255,255,0.55);margin-top:3px;font-weight:600;}

.ville-lock{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.ville-lock-ico{width:36px;height:36px;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.ville-lock-ico svg{width:15px;height:15px;stroke:rgba(255,255,255,0.5);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

.cta-box{
  margin:24px 16px 0;background:#0f1923;border-radius:22px;
  padding:28px 22px;position:relative;overflow:hidden;
}
.cta-box::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:rgba(255,255,255,0.04);border-radius:50%;}
.cta-label{font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.cta-title{font-size:20px;font-weight:900;color:#fff;line-height:1.2;letter-spacing:-0.02em;margin-bottom:6px;}
.cta-sub{font-size:12px;color:rgba(255,255,255,0.45);line-height:1.6;margin-bottom:18px;}
.cta-btn{background:#fff;color:#0f1923;border:none;border-radius:12px;padding:12px 20px;font-family:Manrope,sans-serif;font-size:13px;font-weight:800;cursor:pointer;}
</style>
</head>

    <div class="sec-line"></div>
  </div>
  <div class="villes-grid" id="villes-actives"></div>

  <div id="bientot-hdr" class="sec-label" style="display:none;">
    <div class="sec-dot grey"></div>
    <div class="sec-txt">Bientôt disponibles</div>
    <div class="sec-line"></div>
  </div>
  <div class="villes-grid" id="villes-bientot"></div>

  <div class="cta-box">
    <div class="cta-label">Votre ville n'est pas là ?</div>
    <div class="cta-title">Rejoignez Cœur de Ville</div>
    <div class="cta-sub">Contactez-nous pour valoriser le patrimoine de votre commune.</div>
    <button class="cta-btn">Nous contacter →</button>
  </div>
</div>

<script>
function getVilleFromURL() {
  var parts = window.location.pathname.split('/').filter(function(p){ return p.length>0; });
  var known = ['villeneuve','ales','beaucaire','nimes','uzes'];
  for (var i=0;i<parts.length;i++) if (known.indexOf(parts[i])>=0) return parts[i];
  return new URLSearchParams(window.location.search).get('ville');
}

function makeCard(id, v) {
  var card = document.createElement('div');
  card.className = 'ville-card'+(v.actif?'':' locked');
  var bgStyle = v.photo?'background-image:url('+v.photo+');background-color:'+(v.couleur||'#888')+';':'background-color:'+(v.couleur||'#888')+';';
  var badge = v.actif?'<div class="ville-badge badge-actif">Disponible</div>':'<div class="ville-badge badge-bientot">Bientôt</div>';
  var lock = v.actif?'':'<div class="ville-lock"><div class="ville-lock-ico"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div></div>';
  card.innerHTML = '<div class="ville-bg" style="'+bgStyle+'"></div><div class="ville-overlay"></div>'+badge+lock+'<div class="ville-body"><div class="ville-name">'+v.nom+'</div><div class="ville-dept">'+(v.departement||'')+'</div></div>';
  if (v.actif) card.onclick=(function(vid){ return function(){ window.location.href=vid+'/index.html'; }; })(id);
  return card;
}

window.addEventListener('load', function() {
  fetch('villes.json')
    .then(function(r){ return r.json(); })
    .then(function(villes) {
      var villeId = getVilleFromURL();
      setTimeout(function() {
        document.getElementById('splash').classList.add('hide');
        if (villeId && villes[villeId] && villes[villeId].actif) {
          window.location.href=villeId+'/index.html'; return;
        }
        document.getElementById('selector').style.display='flex';
        var ga=document.getElementById('villes-actives');
        var gb=document.getElementById('villes-bientot');
        var hasBientot=false;
        Object.keys(villes).forEach(function(id) {
          var v=villes[id];
          if(v.actif) ga.appendChild(makeCard(id,v));
          else { gb.appendChild(makeCard(id,v)); hasBientot=true; }
        });
        if(hasBientot) document.getElementById('bientot-hdr').style.display='flex';
      }, 1800);
    })
    .catch(function() {
      setTimeout(function() {
        document.getElementById('splash').classList.add('hide');
        window.location.href='villeneuve/index.html';
      }, 1800);
    });
});
</script>
</body>
</html>
