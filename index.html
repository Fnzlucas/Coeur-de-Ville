<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Cœur de Ville</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:'Manrope',sans-serif;background:#f5f0eb;color:#1a1a1a;min-height:100vh;}

/* Splash */
#splash{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease;}
#splash.hide{opacity:0;pointer-events:none;}
.splash-logo{width:180px;filter:invert(1);animation:logo-in 0.6s ease 0.1s both;}
.splash-tag{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:0.22em;text-transform:uppercase;margin-top:20px;animation:fade-in 0.5s ease 0.4s both;}
.splash-bar{position:absolute;bottom:56px;width:36px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.splash-fill{height:100%;background:rgba(255,255,255,0.6);border-radius:2px;animation:load 1.3s cubic-bezier(0.4,0,0.2,1) 0.3s both;}
@keyframes logo-in{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}
@keyframes load{0%{width:0%;}60%{width:65%;}100%{width:100%;}}

/* Selector */
#selector{display:none;min-height:100vh;flex-direction:column;padding-bottom:48px;}

.sel-header{
  padding:52px 24px 36px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  background:linear-gradient(160deg,#fff 0%,#f5f0eb 100%);
  border-bottom:1px solid #e8e0d8;
}
.sel-logo{height:32px;object-fit:contain;}
.sel-title{font-size:26px;font-weight:900;color:#1a1a1a;text-align:center;letter-spacing:-0.03em;}
.sel-sub{font-size:13px;color:#9ca3af;text-align:center;font-weight:500;}

.section-label{
  padding:28px 20px 12px;
  font-size:11px;font-weight:800;
  color:#9ca3af;
  letter-spacing:0.12em;text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
}
.section-label::after{content:'';flex:1;height:1px;background:#e5e7eb;}

.villes-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 16px;}

.ville-card{
  border-radius:20px;overflow:hidden;
  position:relative;height:190px;
  cursor:pointer;
  transition:transform 0.18s cubic-bezier(0.22,1,0.36,1);
  box-shadow:0 4px 24px rgba(0,0,0,0.12);
}
.ville-card.locked{cursor:default;}
.ville-card:not(.locked):active{transform:scale(0.96);}

.ville-card-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  transition:transform 0.3s ease;
}
.ville-card:not(.locked):hover .ville-card-bg{transform:scale(1.05);}
.ville-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0.1) 60%,transparent 100%);
}
.ville-card.locked .ville-card-overlay{
  background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.4) 100%);
}

.ville-card-badge{
  position:absolute;top:12px;right:12px;
  font-size:9px;font-weight:800;
  padding:5px 10px;border-radius:20px;
  letter-spacing:0.08em;text-transform:uppercase;
  backdrop-filter:blur(8px);
}
.badge-actif{background:rgba(39,174,96,0.95);color:#fff;}
.badge-bientot{background:rgba(0,0,0,0.25);color:rgba(255,255,255,0.7);}

.ville-card-body{position:absolute;bottom:0;left:0;right:0;padding:14px;}
.ville-card-name{font-size:14px;font-weight:900;color:#fff;line-height:1.2;letter-spacing:-0.01em;}
.ville-card-dept{font-size:10px;color:rgba(255,255,255,0.6);margin-top:3px;font-weight:600;}

.ville-card-lock{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-70%);
  width:36px;height:36px;
  background:rgba(255,255,255,0.15);backdrop-filter:blur(8px);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
}
.ville-card-lock svg{width:16px;height:16px;stroke:rgba(255,255,255,0.6);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Footer */
.sel-footer{
  margin:32px 16px 0;
  background:#fff;border-radius:20px;
  padding:20px;text-align:center;
  border:1px solid #e8e0d8;
}
.sel-footer p{font-size:12px;color:#9ca3af;line-height:1.6;}
.sel-footer strong{color:#1a1a1a;font-weight:700;}
</style>
</head>
<body>

<div id="splash">
  <img class="splash-logo" src="assets/shared/logo.png" alt="Coeur de Ville"/>
  <div class="splash-tag">Patrimoine &amp; Decouverte</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<div id="selector">
  <div class="sel-header">
    <img class="sel-logo" src="assets/shared/logo.png" alt="Coeur de Ville"/>
    <div class="sel-title">Choisissez votre ville</div>
    <div class="sel-sub">Découvrez le patrimoine de votre territoire</div>
  </div>

  <div id="villes-actives-label" class="section-label">Villes disponibles</div>
  <div class="villes-grid" id="villes-actives"></div>

  <div id="villes-bientot-label" class="section-label" style="display:none;">Bientôt disponibles</div>
  <div class="villes-grid" id="villes-bientot"></div>

  <div class="sel-footer">
    <p>Votre ville n'est pas encore disponible ?<br/><strong>Contactez-nous</strong> pour rejoindre Cœur de Ville.</p>
  </div>
</div>

<script>
function getVilleFromURL() {
  var path = window.location.pathname;
  var parts = path.split('/').filter(function(p){ return p.length > 0; });
  var known = ['villeneuve','ales','beaucaire','nimes','uzes','aigues-mortes','sommieres'];
  for (var i = 0; i < parts.length; i++) {
    if (known.indexOf(parts[i]) >= 0) return parts[i];
  }
  var params = new URLSearchParams(window.location.search);
  if (params.get('ville')) return params.get('ville');
  return null;
}

function goToVille(id) {
  window.location.href = id + '/index.html';
}

function makeCard(id, v) {
  var card = document.createElement('div');
  card.className = 'ville-card' + (v.actif ? '' : ' locked');

  var bgStyle = v.photo
    ? 'background-image:url(' + v.photo + ');background-color:' + (v.couleur||'#888') + ';'
    : 'background-color:' + (v.couleur||'#888') + ';';

  var badge = v.actif
    ? '<div class="ville-card-badge badge-actif">Disponible</div>'
    : '<div class="ville-card-badge badge-bientot">Bientôt</div>';

  var lock = v.actif ? '' :
    '<div class="ville-card-lock"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>';

  card.innerHTML =
    '<div class="ville-card-bg" style="' + bgStyle + '"></div>' +
    '<div class="ville-card-overlay"></div>' +
    badge + lock +
    '<div class="ville-card-body">' +
      '<div class="ville-card-name">' + v.nom + '</div>' +
      '<div class="ville-card-dept">' + (v.departement||'') + '</div>' +
    '</div>';

  if (v.actif) {
    card.onclick = (function(vid){ return function(){ goToVille(vid); }; })(id);
  }
  return card;
}

window.addEventListener('load', function() {
  fetch('villes.json')
    .then(function(r){ return r.json(); })
    .then(function(villes) {
      var villeId = getVilleFromURL();
      setTimeout(function() {
        document.getElementById('splash').classList.add('hide');
        if (villeId && villes[villeId] && villes[villeId].actif) {
          goToVille(villeId);
          return;
        }
        document.getElementById('selector').style.display = 'flex';
        var gridActif = document.getElementById('villes-actives');
        var gridBientot = document.getElementById('villes-bientot');
        var hasBientot = false;

        Object.keys(villes).forEach(function(id) {
          var v = villes[id];
          var card = makeCard(id, v);
          if (v.actif) {
            gridActif.appendChild(card);
          } else {
            gridBientot.appendChild(card);
            hasBientot = true;
          }
        });

        if (hasBientot) {
          document.getElementById('villes-bientot-label').style.display = 'flex';
        }
      }, 1800);
    })
    .catch(function() {
      setTimeout(function() {
        document.getElementById('splash').classList.add('hide');
        window.location.href = 'villeneuve/index.html';
      }, 1800);
    });
});
</script>
</body>
</html>
